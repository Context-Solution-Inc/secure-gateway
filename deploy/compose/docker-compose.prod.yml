# Production single-VPS deployment (PRD §9.2). Self-contained: run from THIS
# directory so the build context (../..) is the repo root and the relative
# volumes (./keys, ./Caddyfile, ./.env) resolve here.
#
#   cd deploy/compose
#   cp .env.example .env            # fill in real values
#   mkdir -p keys && go run ../../cmd/devtoken -gen-keys -out-dir ./keys -alg ES256
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates TLS (auto Let's Encrypt) and is the ONLY service that
# publishes ports (80/443). relay/auth/redis/postgres stay on the internal
# network. See the README "Deployment → Production (VPS)" section.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - relay
      - auth
      - models
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Start as the unprivileged redis user (uid 999) directly. cap_drop:[ALL]
    # removes CAP_SETUID, so the image's root entrypoint can't setpriv-drop to
    # the redis user (setresuid → "Operation not permitted"); running as that
    # user from the start sidesteps the drop. Safe because persistence is off
    # (no /data to chown). See README "Build off-box → troubleshooting".
    user: redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Drop the default capability set and re-add only what the alpine entrypoint
    # needs: it starts as root to chown/init the data volume, then su-exec drops to
    # the unprivileged postgres user. CHOWN/DAC_OVERRIDE/FOWNER cover the volume
    # prep; SETUID/SETGID cover the privilege drop (SG-20).
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    security_opt:
      - no-new-privileges:true

  auth:
    build:
      context: ../..
      dockerfile: Dockerfile.auth
      args:
        VERSION: prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AUTH_LISTEN_ADDR: ":8080"
      # Private metrics listener (SG-06/SG-11): on the internal Docker network only,
      # never published to the host and 404'd at the Caddy edge.
      AUTH_METRICS_ADDR: ":9090"
      AUTH_JWT_ISSUER: "${JWT_ISSUER}"
      AUTH_JWT_AUDIENCE: "relay"
      AUTH_JWT_ALG: "ES256"
      AUTH_JWT_KID: "auth-1"
      AUTH_JWT_SIGNING_KEY_FILE: "/keys/relay.key.json"
      AUTH_STORE: "postgres"
      AUTH_DB_DSN: "postgres://auth:${POSTGRES_PASSWORD}@postgres:5432/auth?sslmode=disable"
      AUTH_BACKPLANE: "redis"
      AUTH_REDIS_ADDR: "redis:6379"
      AUTH_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      # Stripe is all-or-none: set all three to enable billing, or leave all
      # three empty with AUTH_BILLING_DISABLED=true to run ungated. A partial set
      # is rejected at startup. See deploy/compose/.env.example.
      AUTH_STRIPE_WEBHOOK_SECRET: "${AUTH_STRIPE_WEBHOOK_SECRET:-}"
      AUTH_STRIPE_SECRET_KEY: "${AUTH_STRIPE_SECRET_KEY:-}"
      AUTH_STRIPE_PRICE_ID: "${AUTH_STRIPE_PRICE_ID:-}"
      AUTH_BILLING_DISABLED: "${AUTH_BILLING_DISABLED:-false}"
      AUTH_CLAIM_TTL: "${AUTH_CLAIM_TTL:-30m}"
      AUTH_ADMIN_KEY: "${AUTH_ADMIN_KEY}"
      AUTH_PUBLIC_URL: "https://${AUTH_HOST}"
      AUTH_RELAY_URL: "wss://${RELAY_HOST}/v1/connect"
      # Caddy sets X-Forwarded-For; trust it so rate limiting keys on the client IP.
      AUTH_TRUST_PROXY: "true"
      AUTH_LOG_FORMAT: "json"
    volumes:
      # Mounted signing key must be readable by the container's uid 65532
      # (distroless nonroot). Keep it private — chown to that uid rather than
      # world-reading it:
      #   sudo chown -R 65532:65532 keys && sudo chmod 0750 keys && sudo chmod 0640 keys/relay.key.json
      - ./keys:/keys:ro
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

  relay:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    environment:
      RELAY_LISTEN_ADDR: ":8443"
      # Private metrics listener (SG-06/SG-11): internal network only, never
      # published to the host and 404'd at the Caddy edge.
      RELAY_METRICS_ADDR: ":9090"
      RELAY_JWT_ISSUER: "${JWT_ISSUER}"
      RELAY_JWT_AUDIENCE: "relay"
      RELAY_JWKS_URL: "http://auth:8080/.well-known/jwks.json"
      RELAY_BACKPLANE: "redis"
      RELAY_REDIS_ADDR: "redis:6379"
      RELAY_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      RELAY_TRUST_PROXY: "true"
      RELAY_LOG_FORMAT: "json"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Network-namespaced TCP tuning (host-level knobs live in docs/tuning.md).
    sysctls:
      net.core.somaxconn: "65535"
      net.ipv4.tcp_max_syn_backlog: "65535"
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: "1"

  models:
    # Serves AI model files for download (static content). A single statically
    # linked Rust binary on a scratch base — no shell, libc, or package manager,
    # so the attack surface is essentially just the binary. Internal network
    # only; the Caddy edge terminates TLS and reverse-proxies to it (SG-11).
    #
    # Pin the immutable version tag AND digest — never :latest in prod. The image
    # defaults to USER root and EXPOSE 80, so we MUST override: run as the same
    # uid 65532 the Go services use (cap_drop:[ALL] then forbids binding <1024,
    # hence --port=8080). Refresh the digest when bumping the version:
    #   docker buildx imagetools inspect ghcr.io/static-web-server/static-web-server:2.43.0
    image: ghcr.io/static-web-server/static-web-server:2.43.0@sha256:6acea6260b14e08dda986361e42640082fbfaab8d88c327de532bb13a3b22994
    restart: unless-stopped
    command:
      - --root=/models
      - --port=8080
      - --compression=false          # model blobs (gguf/safetensors) are already compressed
      - --directory-listing=false     # download by exact URL only; no index/enumeration
      - --cache-control-headers=true  # let clients/CDNs cache immutable artifacts
      - --log-level=info
    user: "65532:65532"
    volumes:
      # Operator provisions ./models out-of-band (rsync/scp). Unlike ./keys these
      # are NOT secret, so they only need to be world-readable (0644) by uid 65532:
      #   mkdir -p models && rsync model.gguf vps:~/secure-gateway/models/
      - ./models:/models:ro
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  caddy_data:
  caddy_config:
