# Production single-VPS deployment (PRD §9.2). Self-contained: run from THIS
# directory so the build context (../..) is the repo root and the relative
# volumes (./keys, ./Caddyfile, ./.env) resolve here.
#
#   cd deploy/compose
#   cp .env.example .env            # fill in real values
#   mkdir -p keys && go run ../../cmd/devtoken -gen-keys -out-dir ./keys -alg ES256
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy terminates TLS (auto Let's Encrypt) and is the ONLY service that
# publishes ports (80/443). relay/auth/redis/postgres stay on the internal
# network. See the README "Deployment → Production (VPS)" section.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - relay
      - auth
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Start as the unprivileged redis user (uid 999) directly. cap_drop:[ALL]
    # removes CAP_SETUID, so the image's root entrypoint can't setpriv-drop to
    # the redis user (setresuid → "Operation not permitted"); running as that
    # user from the start sidesteps the drop. Safe because persistence is off
    # (no /data to chown). See README "Build off-box → troubleshooting".
    user: redis
    command: ["redis-server", "--save", "", "--appendonly", "no", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

  auth:
    build:
      context: ../..
      dockerfile: Dockerfile.auth
      args:
        VERSION: prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      AUTH_LISTEN_ADDR: ":8080"
      AUTH_JWT_ISSUER: "${JWT_ISSUER}"
      AUTH_JWT_AUDIENCE: "relay"
      AUTH_JWT_ALG: "ES256"
      AUTH_JWT_KID: "auth-1"
      AUTH_JWT_SIGNING_KEY_FILE: "/keys/relay.key.json"
      AUTH_STORE: "postgres"
      AUTH_DB_DSN: "postgres://auth:${POSTGRES_PASSWORD}@postgres:5432/auth?sslmode=disable"
      AUTH_BACKPLANE: "redis"
      AUTH_REDIS_ADDR: "redis:6379"
      AUTH_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      # Stripe is all-or-none: set all three to enable billing, or leave all
      # three empty with AUTH_BILLING_DISABLED=true to run ungated. A partial set
      # is rejected at startup. See deploy/compose/.env.example.
      AUTH_STRIPE_WEBHOOK_SECRET: "${AUTH_STRIPE_WEBHOOK_SECRET:-}"
      AUTH_STRIPE_SECRET_KEY: "${AUTH_STRIPE_SECRET_KEY:-}"
      AUTH_STRIPE_PRICE_ID: "${AUTH_STRIPE_PRICE_ID:-}"
      AUTH_BILLING_DISABLED: "${AUTH_BILLING_DISABLED:-false}"
      AUTH_CLAIM_TTL: "${AUTH_CLAIM_TTL:-30m}"
      AUTH_ADMIN_KEY: "${AUTH_ADMIN_KEY}"
      AUTH_PUBLIC_URL: "https://${AUTH_HOST}"
      AUTH_RELAY_URL: "wss://${RELAY_HOST}/v1/connect"
      # Caddy sets X-Forwarded-For; trust it so rate limiting keys on the client IP.
      AUTH_TRUST_PROXY: "true"
      AUTH_LOG_FORMAT: "json"
    volumes:
      # Mounted signing key must be readable by the container's uid 65532
      # (distroless nonroot). Keep it private — chown to that uid rather than
      # world-reading it:
      #   sudo chown -R 65532:65532 keys && sudo chmod 0750 keys && sudo chmod 0640 keys/relay.key.json
      - ./keys:/keys:ro
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

  relay:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    environment:
      RELAY_LISTEN_ADDR: ":8443"
      RELAY_JWT_ISSUER: "${JWT_ISSUER}"
      RELAY_JWT_AUDIENCE: "relay"
      RELAY_JWKS_URL: "http://auth:8080/.well-known/jwks.json"
      RELAY_BACKPLANE: "redis"
      RELAY_REDIS_ADDR: "redis:6379"
      RELAY_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      RELAY_TRUST_PROXY: "true"
      RELAY_LOG_FORMAT: "json"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Network-namespaced TCP tuning (host-level knobs live in docs/tuning.md).
    sysctls:
      net.core.somaxconn: "65535"
      net.ipv4.tcp_max_syn_backlog: "65535"
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: "1"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
