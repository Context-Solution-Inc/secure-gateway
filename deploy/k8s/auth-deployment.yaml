# Auth & License Service Deployment (PRD §5.1, §9.2). Holds the JWT signing key
# (mounted read-only from a Secret); same hardening as the relay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels: { app: auth }
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth }
  template:
    metadata:
      labels: { app: auth }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth
          image: secure-gateway/auth:latest # pin by digest in production
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: auth-config }
            - secretRef: { name: auth-secrets }
          volumeMounts:
            - name: signing-key
              mountPath: /keys
              readOnly: true
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 20
      volumes:
        - name: signing-key
          secret:
            secretName: auth-signing-key
            defaultMode: 0400
      terminationGracePeriodSeconds: 40
