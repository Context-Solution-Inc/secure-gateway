# TEMPLATE ONLY — placeholders, not real secrets. Copy to secrets.yaml, fill in,
# and apply out-of-band (or use a sealed-secrets / external-secrets operator).
# Do NOT commit the filled-in version. Secrets never go in images or ConfigMaps
# (PRD §9.1, §10.2).
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  labels: { app: auth }
type: Opaque
stringData:
  # Postgres DSN (contains the DB password).
  AUTH_DB_DSN: "postgres://auth:CHANGE_ME@postgres:5432/auth?sslmode=require"
  # Stripe is all-or-none: these two plus AUTH_STRIPE_PRICE_ID (in the ConfigMap)
  # must all be set to enable billing, or all be empty with AUTH_BILLING_DISABLED=
  # "true" in the ConfigMap to run ungated. A partial set is rejected at startup.
  AUTH_STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  AUTH_STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  # Admin key for POST /v1/accounts provisioning (empty disables the endpoint).
  AUTH_ADMIN_KEY: "CHANGE_ME"
  # Redis password (omit/empty if Redis is unauthenticated on a private network).
  AUTH_REDIS_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: relay-secrets
  labels: { app: relay }
type: Opaque
stringData:
  RELAY_REDIS_PASSWORD: ""
---
# JWT signing key (PKCS#8 PEM or the JSON wrapper). Mounted read-only into the
# auth pod at AUTH_JWT_SIGNING_KEY_FILE. Generate with:
#   go run ./cmd/devtoken -gen-keys -out-dir ./keys -alg ES256
# then: kubectl create secret generic auth-signing-key --from-file=signing.key.json=keys/relay.key.json
apiVersion: v1
kind: Secret
metadata:
  name: auth-signing-key
  labels: { app: auth }
type: Opaque
stringData:
  signing.key.json: |
    {"REPLACE": "with the contents of your PKCS#8 signing key / JSON wrapper"}
