# Local full stack: Auth & License Service (M2) + relay (M1) + Redis backplane
# + Postgres. The auth service holds the JWT signing key and serves the JWKS the
# relay verifies tokens against; both share the Redis backplane for revocations.
#
# Before `docker compose up`, generate a dev signing keypair (the auth service
# signs with the private key; it also serves the public JWKS):
#
#   go run ./cmd/devtoken -gen-keys -out-dir ./keys -alg ES256
#   chmod 0755 keys && chmod 0644 keys/relay.key.json
#   docker compose up --build
#
# Then exercise the lifecycle by sending Stripe test webhooks to
# http://localhost:8080/v1/webhooks/stripe (e.g. via `stripe listen`), or use
# the auth API directly. The relay listens on :8443 (plain HTTP behind a proxy).

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: authpass
      POSTGRES_DB: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 5s
      timeout: 3s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
      args:
        VERSION: dev
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AUTH_LISTEN_ADDR: ":8080"
      AUTH_JWT_ISSUER: "https://auth.example.com"
      AUTH_JWT_AUDIENCE: "relay"
      AUTH_JWT_ALG: "ES256"
      AUTH_JWT_KID: "dev-1"
      AUTH_JWT_SIGNING_KEY_FILE: "/keys/relay.key.json"
      AUTH_STORE: "postgres"
      AUTH_DB_DSN: "postgres://auth:authpass@postgres:5432/auth?sslmode=disable"
      AUTH_BACKPLANE: "redis"
      AUTH_REDIS_ADDR: "redis:6379"
      AUTH_PUBLIC_URL: "http://${LOCAL_IP_ADDR}:8080"
      AUTH_RELAY_URL: "ws://${LOCAL_IP_ADDR}:8443/v1/connect"
      # Set these to your Stripe test-mode values to drive a real lifecycle:
      AUTH_STRIPE_WEBHOOK_SECRET: "${AUTH_STRIPE_WEBHOOK_SECRET}"
      AUTH_STRIPE_SECRET_KEY: "${AUTH_STRIPE_SECRET_KEY}"
      # Desktop subscription onboarding (claim-token flow). Empty price id ⇒
      # POST /v1/checkout/start is disabled (503); see deploy/compose/.env.example.
      AUTH_STRIPE_PRICE_ID: "${AUTH_STRIPE_PRICE_ID:-}"
      AUTH_CLAIM_TTL: 30m
      AUTH_ADMIN_KEY: "dev_admin_key"
      AUTH_LOG_FORMAT: "json"
    volumes:
      # The container runs as the distroless nonroot user (uid 65532), so the
      # mounted signing key must be readable by it. `make keys` writes it 0600
      # owned by your host user; for this dev key run:
      #   chmod 0755 keys && chmod 0644 keys/relay.key.json
      - ./keys:/keys:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  relay:
    build:
      context: .
      args:
        VERSION: dev
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "8443:8443"
    environment:
      RELAY_LISTEN_ADDR: ":8443"
      RELAY_JWT_ISSUER: "https://auth.example.com"
      RELAY_JWT_AUDIENCE: "relay"
      # Verify tokens via the auth service's JWKS (production path) rather than a
      # static public key file.
      RELAY_JWKS_URL: "http://${LOCAL_IP_ADDR}:8080/.well-known/jwks.json"
      RELAY_BACKPLANE: "redis"
      RELAY_JWT_ALGS: "ES256"
      RELAY_REDIS_ADDR: "redis:6379"
      RELAY_LOG_FORMAT: "json"
      # No TLS cert set: the relay serves plain HTTP, intended to sit behind a
      # TLS-terminating proxy. For direct wss, mount certs and set
      # RELAY_TLS_CERT_FILE / RELAY_TLS_KEY_FILE.
    # Container hardening (PRD §9.2).
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    # Kernel TCP tuning for many concurrent/idle connections (PRD §9.2, §10.1).
    # These are network-namespaced sysctls (safe to set per-container). Host-level
    # knobs (net.core.rmem_max/wmem_max, fs.file-max) must be set on the host —
    # see docs/tuning.md.
    sysctls:
      net.core.somaxconn: "65535"
      net.ipv4.tcp_max_syn_backlog: "65535"
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: "1"
